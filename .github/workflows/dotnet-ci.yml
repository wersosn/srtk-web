name: .NET CI

on:
  push:
    branches: [ "test-ci" ]
  pull_request:
    branches: [ "test-ci" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies (Backend)
      run: dotnet restore ./backend/srtk/srtk.sln

    - name: Build Backend
      run: dotnet build ./backend/srtk/srtk.sln --configuration Release --no-restore

# --- Run tests ---
    - name: Run unit tests
      run: dotnet test ./backend/tests/srtk.tests/srtk.tests/srtk.tests.csproj --no-build --verbosity normal